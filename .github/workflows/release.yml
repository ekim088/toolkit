name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write # for npm OIDC trusted publishing

    outputs:
      published: ${{ steps.changesets.outputs.published }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      # Enable Corepack so the yarn version from packageManager is used
      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --immutable

      # Validate package output
      - run: yarn lint
      - run: yarn test:ci

      - name: Update npm for Trusted Publishing
        run: npm install -g npm@latest

      # Derive commit message that satisfies commitlint and states planned version
      - name: Derive Commit Message
        id: planned
        run: |
          yarn changeset status --output=changeset-status.json || true
          version=$(node -p "try { require('./changeset-status.json').releases[0].newVersion || '' } catch { '' }")
          rm -f changeset-status.json
          if [ -n "$version" ]; then
            echo "message=chore: release v$version" >> "$GITHUB_OUTPUT"
          else
            echo "message=chore: version packages" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          # Apply derived commit message on release.
          version: yarn changeset version
          publish: yarn release
          commit: ${{ steps.planned.outputs.message }}
          title: ${{ steps.planned.outputs.message }}
        env:
          # Fine-grained PAT (not the default token) so the Version Packages
          # PR triggers CI; generate at the following page if expired:
          # GitHub profile → Settings → Developer settings → Personal access tokens → Fine-grained tokens → Generate new token
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PAT }}

      - name: Send Notification on Publish
        if: steps.changesets.outputs.published == 'true'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "<@${{ secrets.DISCORD_USER_ID }}>",
                 "embeds": [{
                   "title": "📦 Publish Successful",
                   "description": "A new version of ${{ github.repository }} was published!",
                   "color": 3066993,
                   "fields": [
                     { "name": "Repository", "value": "${{ github.repository }}", "inline": true },
                     { "name": "Version", "value": "${{ fromJSON(steps.changesets.outputs.publishedPackages)[0].version }}", "inline": true }
                   ]
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

  # Deploy docs to GitHub Pages after a successful publish.
  docs:
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/docs.yml
