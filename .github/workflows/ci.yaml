name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    # validate the package builds successfully and all tests pass
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22.x, 24.x, 26.x]

        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
            # install corepack since it's not bundled with Node.js 25+
            - run: npm install -g corepack && corepack enable
            - run: yarn install --immutable
            - run: yarn build
            - run: yarn lint
            - run: yarn test:ci

    # validate the package's exports can be successfully imported
    package:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 24.x
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
            - run: npm install -g corepack && corepack enable
            - run: yarn install --immutable
            - run: yarn lint:package
            - name: Validate import methods
              run: |
                  mkdir "$RUNNER_TEMP/consumer" && cd "$RUNNER_TEMP/consumer"
                  npm init -y > /dev/null
                  npm install "$GITHUB_WORKSPACE/package.tgz"
                  node --input-type=module -e "import { chunk } from '@ekim088/toolkit'; if (typeof chunk !== 'function') throw new Error('barrel import failed');"
                  node --input-type=module -e "import { chunk } from '@ekim088/toolkit/chunk'; if (typeof chunk !== 'function') throw new Error('subpath import failed');"

    # Require that changes to src have an associated changeset. Add an empty one
    # via `yarn changeset --empty` when no release is needed.
    changeset:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest

        permissions:
            pull-requests: read

        steps:
            - uses: dorny/paths-filter@v4
              id: changes
              with:
                  filters: |
                      src:
                          - 'src/**'
                      changeset:
                          - added: '.changeset/**'
            - name: Require a changeset for src changes
              if: steps.changes.outputs.src == 'true' && steps.changes.outputs.changeset == 'false'
              run: |
                  echo "::error::src changed but no changeset was added. Run 'yarn changeset', or 'yarn changeset --empty' if this change doesn't need a release."
                  exit 1
