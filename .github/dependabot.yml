version: 2
updates:
  # Enable version updates for npm dependencies. Minor and patch update PRs
  # are grouped weekly; major updates get their own.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'chore(deps)'
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      security:
        applies-to: security-updates
        patterns:
          - '*'
    open-pull-requests-limit: 10

  # Enable version updates for GitHub Actions.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
    commit-message:
      prefix: 'ci(deps)'
    groups:
      actions:
        patterns:
          - '*'
